name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build single HTML
        run: node build-single.mjs

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          name: "EXIF Batch Editor ${{ github.ref_name }}"
          body: "단일 HTML 파일을 다운로드하여 브라우저에서 바로 실행하세요.\n\nDownload the single HTML file and open it in any browser.\n\nSee the [changelog](https://github.com/Merseong/web-exif-for-film/commits/${{ github.ref_name }}) for details."
          files: build/exif-editor.html
          tag_name: ${{ github.ref_name }}
