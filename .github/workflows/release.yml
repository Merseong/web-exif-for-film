name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-single-html:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build single HTML
        run: node build-single.mjs

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: build/exif-editor.html
          tag_name: ${{ github.ref_name }}

  build-tauri:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: --target universal-apple-darwin

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      - name: Prepare frontend dist
        shell: bash
        run: |
          mkdir -p dist/css dist/scripts dist/icons
          cp index.html manifest.json sw.js favicon.ico dist/
          cp css/style.css dist/css/
          cp scripts/*.js dist/scripts/
          cp icons/*.png dist/icons/ 2>/dev/null || true

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "EXIF Batch Editor ${{ github.ref_name }}"
          releaseBody: "See the [changelog](https://github.com/Merseong/web-exif-for-film/commits/${{ github.ref_name }}) for details."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
